<!DOCTYPE html>
<html>
<head>
    <title>Attendance Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: 30px auto;
        }

        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }

        .form-section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, select {
            width: 30%;
            padding: 8px;
            margin: 8px 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 15px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th {
            background-color: #34495e;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        .footer {
            text-align: center;
            padding: 15px;
            background-color: #2c3e50;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>Attendance Management System</h1>
</header>

<div class="container">

    <!-- Add Student Section -->
    <div class="form-section">
        <h2>Add Student</h2>
        <input type="text" placeholder="Student Name">
        <input type="text" placeholder="Roll Number">
        <input type="text" placeholder="Class">
        <button>Add Student</button>
    </div>

    <!-- Mark Attendance Section -->
    <div class="form-section">
        <h2>Mark Attendance</h2>
        <input type="text" placeholder="Student ID">
        <input type="date">
        <select>
            <option>Select Status</option>
            <option>Present</option>
            <option>Absent</option>
        </select>
        <button>Submit</button>
    </div>

    <!-- Attendance Table -->
    <div class="form-section">
        <h2>Attendance Records</h2>
        <table>
            <tr>
                <th>Student Name</th>
                <th>Roll Number</th>
                <th>Date</th>
                <th>Status</th>
            </tr>
            <tr>
                <td>John Doe</td>
                <td>101</td>
                <td>2026-03-02</td>
                <td>Present</td>
            </tr>
            <tr>
                <td>Jane Smith</td>
                <td>102</td>
                <td>2026-03-02</td>
                <td>Absent</td>
            </tr>
        </table>
    </div>

</div>

<div class="footer">
    © 2026 Attendance System | Simple HTML + CSS Project
</div>

</body>
</html>
