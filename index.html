<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="glass-container login-card animate-fade-in">
            <div class="login-header">
                <div class="avatar" style="margin: 0 auto 1rem auto; width: 64px; height: 64px; font-size: 1.5rem;">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Sign in to track your expenses</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password">
                </div>

                <div id="loginError" class="error-message">
                    <i class="fa-solid fa-circle-exclamation" style="margin-right: 0.5rem;"></i> Invalid credentials. Please try again.
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">
                    Sign In <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
            
            <!-- Credentials hidden -->
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
